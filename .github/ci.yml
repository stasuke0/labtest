name: CI Pipeline

on:
  push:
    branches: [ "main" ]

# Crucial permission for uploading ESLint results to the GitHub Security tab
permissions:
  security-events: write
  contents: read

jobs:
  security-and-testing:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm install

      - name: Dependency Check
        # Scans your package.json for vulnerable packages
        run: npm audit --audit-level=moderate || true 

      - name: Run ESLint Security Scan
        run: npx eslint . --format @microsoft/eslint-formatter-sarif --output-file eslint-results.sarif
        continue-on-error: true

      - name: Upload SARIF report
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: eslint-results.sarif

      - name: Spin up Infrastructure (Integration)
        # Starts your Postgres DB, Node App, and SonarQube container
        run: docker-compose up -d

      - name: Wait for Services to Boot
        run: sleep 10

      - name: Run UI Testing over HTTP
        run: npm test