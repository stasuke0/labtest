version: '3.8'
services:
  web:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      - db
  db:
    image: postgres:15
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin
      - POSTGRES_DB=searchdb
    ports:
      - "5432:5432"
    volumes:
      # Automatically runs the SQL script below when the database starts
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql